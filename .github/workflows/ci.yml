name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# отменяем устаревшие прогоны на той же ветке/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Обязательный gate: типы + юнит-тесты + сборка. Секреты Supabase нужны на этапе
  # build (публичные ключи читаются в конфиг); typecheck/тесты работают и без них.
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # версия pnpm задана явно: в package.json нет поля packageManager,
      # а lockfileVersion 9.0 читается pnpm 9.x
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # --frozen-lockfile ставит ровно по pnpm-lock + запускает postinstall (nuxt prepare → .nuxt типы)
      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # фикс OOM (exit 134) на gzip больших чанков — см. память build-oom-heap
          NODE_OPTIONS: --max-old-space-size=6144
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          NUXT_PUBLIC_SITE_URL: ${{ secrets.NUXT_PUBLIC_SITE_URL }}

  # RLS-аудит: интеграционные тесты политик через реальный PostgREST + JWT обычного
  # пользователя (tests/integration). Лёгкий (без браузеров/сборки). Гейтится тем же
  # флагом и секретами, что и e2e (нужна БД + тест-аккаунт); без них — пропускается.
  rls-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    if: ${{ vars.RUN_E2E == 'true' }}
    env:
      NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_CUSTOMER_EMAIL: ${{ secrets.E2E_CUSTOMER_EMAIL }}
      E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # версия pnpm задана явно: в package.json нет поля packageManager,
      # а lockfileVersion 9.0 читается pnpm 9.x
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: RLS security tests
        run: pnpm test:rls

  # E2E (Playwright) — запускается только если в репозитории включён vars.RUN_E2E='true'
  # и заданы секреты Supabase. Иначе пропускается (без красного CI).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    if: ${{ vars.RUN_E2E == 'true' }}
    env:
      NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PAYMENT_WEBHOOK_SECRET: ${{ secrets.PAYMENT_WEBHOOK_SECRET }}
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
      E2E_CUSTOMER_EMAIL: ${{ secrets.E2E_CUSTOMER_EMAIL }}
      E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # версия pnpm задана явно: в package.json нет поля packageManager,
      # а lockfileVersion 9.0 читается pnpm 9.x
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: E2E tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
